<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f0f10"/>

  <!-- Yellow accent bar top-left -->
  <rect x="6" y="6" width="10" height="3" rx="1.5" fill="#ffd400"/>

  <!-- S letterform built from bars -->
  <!-- Top bar -->
  <rect x="6" y="6" width="14" height="3" rx="1.5" fill="#ffd400"/>
  <!-- Middle bar -->
  <rect x="6" y="14.5" width="14" height="3" rx="1.5" fill="#ffd400"/>
  <!-- Bottom bar -->
  <rect x="6" y="23" width="14" height="3" rx="1.5" fill="#ffd400"/>
  <!-- Top-left vertical -->
  <rect x="6" y="6" width="3" height="8" rx="1.5" fill="#ffd400"/>
  <!-- Bottom-right vertical -->
  <rect x="17" y="17.5" width="3" height="8.5" rx="1.5" fill="#ffd400"/>

  <!-- DZ dot accent -->
  <circle cx="24" cy="26" r="2.2" fill="#ffd400" opacity="0.85"/>
</svg>
